name: skornow
description: "SkorNow - Portal Berita Bola Offline-First (UAS Mobile Programming Lanjut)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

# PENTING: isar_community, isar_community_flutter_libs, dan isar_community_generator
# WAJIB versi yang PERSIS SAMA (sesuai rekomendasi resmi isar-community.dev).
# Pakai YAML anchor di bawah ini supaya selalu sinkron otomatis.
isar_version: &isar_version 3.3.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.7.0

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3
  logger: ^2.3.0

  # Local Database (Offline-First)
  # NOTE: paket resmi "isar" sudah lama tidak diupdate dan bentrok versi
  # dengan Dart SDK terbaru. Dipakai fork aktif: isar_community.
  isar_community:
    version: *isar_version
  isar_community_flutter_libs:
    version: *isar_version
  path_provider: ^2.1.3

  # Preferences (theme, env flags ringan)
  shared_preferences: ^2.2.3

  # Animasi (Lottie untuk state error/empty)
  lottie: ^3.1.2

  # Icons & UI
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.11
  isar_community_generator:
    version: *isar_version
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
